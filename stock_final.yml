name: Stock Report Auto Run

on:
  workflow_dispatch: # 讓您可以手動測試
  schedule:
    - cron: '30 07 * * 1-5' # 台灣時間下午 3:30 自動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v3
      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 安裝必要套件
        run: pip install pandas requests
      - name: 執行選股分析
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
